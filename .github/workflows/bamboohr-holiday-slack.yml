name: BambooHR Holiday Slack Notification

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  check-holidays:
    runs-on: ubuntu-latest

    steps:
      - name: Check BambooHR for today's public holidays
        env:
          BAMBOOHR_API_KEY: ${{ secrets.BAMBOOHR_API_KEY }}
          BAMBOOHR_SUBDOMAIN: ${{ secrets.BAMBOOHR_SUBDOMAIN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: '#team-bamboohr'
        run: |
          TODAY=$(date +%Y-%m-%d)
          echo "Checking holidays for $TODAY"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -u "${BAMBOOHR_API_KEY}:x" \
            -H "Accept: application/json" \
            "https://api.bamboohr.com/api/gateway.php/${BAMBOOHR_SUBDOMAIN}/v1/time_off/whos_out/?start=${TODAY}&end=${TODAY}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "BambooHR response code: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "BambooHR API error — exiting"
            exit 1
          fi

          HOLIDAY_COUNT=$(echo "$BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          holidays = [e for e in data if e.get('type') == 'holiday']
          print(len(holidays))
          ")

          echo "Holidays found: $HOLIDAY_COUNT"

          if [ "$HOLIDAY_COUNT" -eq "0" ]; then
            echo "No holidays today — nothing to post."
            exit 0
          fi

          SLACK_TEXT=$(echo "$BODY" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          holidays = [e for e in data if e.get('type') == 'holiday']
          lines = [f':calendar: *{h.get(\"name\", \"Public Holiday\")}*' for h in holidays]
          print('*Public Holiday Today*\n' + '\n'.join(lines))
          ")

          curl -s -X POST \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"channel\":\"${SLACK_CHANNEL}\",\"text\":$(echo "$SLACK_TEXT" | python3 -c 'import sys,json;print(json.dumps(sys.stdin.read().strip()))')}" \
            https://slack.com/api/chat.postMessage

          echo "Done!"
